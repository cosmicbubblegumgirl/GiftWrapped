name: Deploy Frontend User Site

on:
  push:
    branches:
      - main
    paths:
      - giftlink-frontend/**
      - .github/workflows/deploy-frontend-user-site.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: giftlink-frontend
    steps:
      - name: Checkout GiftWrapped
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: giftlink-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: npm run build

      - name: Publish build to user site repository
        env:
          USER_SITE_DEPLOY_TOKEN: ${{ secrets.USER_SITE_DEPLOY_TOKEN }}
          USER_SITE_REPO: ${{ vars.USER_SITE_REPO || 'cosmicbubblegumgirl/cosmicbubblegumgirl.github.io' }}
        run: |
          set -euo pipefail
          if [[ -z "${USER_SITE_DEPLOY_TOKEN:-}" ]]; then
            echo "USER_SITE_DEPLOY_TOKEN secret is required"
            exit 1
          fi

          cd "$GITHUB_WORKSPACE"
          TARGET_DIR="user-site"
          git clone "https://x-access-token:${USER_SITE_DEPLOY_TOKEN}@github.com/${USER_SITE_REPO}.git" "$TARGET_DIR"

          rsync -av --delete --exclude ".git" giftlink-frontend/build/ "$TARGET_DIR/"

          cd "$TARGET_DIR"
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Deploy from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
            git push origin HEAD
          else
            echo "No frontend changes to deploy"
          fi
