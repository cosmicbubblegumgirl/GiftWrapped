version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: giftwrapped-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ..
      dockerfile: deployment/backend.Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: ${PORT:-5000}
      NODE_ENV: ${NODE_ENV:-production}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/giftwrapped}
      DB_NAME: ${DB_NAME:-giftwrapped}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - mongo

  frontend:
    build:
      context: ..
      dockerfile: deployment/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
